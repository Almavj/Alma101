# Render manifest: defines two services (frontend static and backend web service)
services:
  - type: web
    name: alma101-frontend
    root: .
    env: docker
    plan: standard
    dockerfilePath: docker/frontend/Dockerfile
    buildCommand: npm ci && npm run build
    startCommand: nginx -g 'daemon off;'
    envVars:
      - key: VITE_BASE_PATH
        value: /
      - key: VITE_SUPABASE_URL
        syncFromPostgres: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        syncFromPostgres: false
      - key: VITE_API_URL
        value: /api
      - key: VITE_SUPABASE_ADMIN_EMAIL
        syncFromPostgres: false
      - key: VITE_SITE_URL
        syncFromPostgres: false

  - type: web
    name: alma101-backend
    root: .
    env: docker
    plan: standard
    dockerfilePath: docker/backend/Dockerfile
    buildCommand: composer install --no-dev --no-interaction --prefer-dist -o
    startCommand: apache2-foreground
    envVars:
      - key: SUPABASE_URL
        scope: PRIVATE
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: PRIVATE
      - key: SUPABASE_ANON_KEY
        scope: PRIVATE
      - key: SUPABASE_ADMIN_EMAIL
        scope: PRIVATE
      - key: CORS_ALLOWED_ORIGINS
        scope: PRIVATE
      - key: SITE_URL
        scope: PRIVATE
      - key: SITE_DOMAIN
        scope: PRIVATE
      - key: EMAIL_FROM
        scope: PRIVATE
      - key: EMAIL_SMTP_HOST
        scope: PRIVATE
      - key: EMAIL_SMTP_USER
        scope: PRIVATE
      - key: EMAIL_SMTP_PASS
        scope: PRIVATE
      - key: EMAIL_SMTP_PORT
        value: "587"
      - key: EMAIL_SMTP_SECURE
        value: tls
      - key: SENDGRID_API_KEY
        scope: PRIVATE
